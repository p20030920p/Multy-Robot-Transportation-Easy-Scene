
TrajectoryPlannerROS:
  # 机器人速度限制（AGV运输车参数）
  max_vel_x: 0.5  # 最大前向速度 0.5m/s
  min_vel_x: 0.1  # 最小前向速度
  max_vel_theta: 1.0  # 最大旋转速度
  min_in_place_vel_theta: 0.4  # 原地旋转最小速度
  
  # 加速度限制
  acc_lim_x: 2.5
  acc_lim_theta: 3.2
  acc_lim_y: 0.0  # 非全向机器人
  
  # 目标容忍度
  xy_goal_tolerance: 0.1  # 位置容忍 10cm
  yaw_goal_tolerance: 0.1  # 角度容忍
  latch_xy_goal_tolerance: false
  
  # 轨迹采样参数
  sim_time: 1.7  # 轨迹模拟时间
  sim_granularity: 0.025  # 轨迹模拟粒度
  vx_samples: 6
  vtheta_samples: 20
  
  # 评分权重
  path_distance_bias: 32.0  # 路径距离权重
  goal_distance_bias: 24.0  # 目标距离权重
  occdist_scale: 0.01  # 障碍物距离权重
  
  # 振荡防止
  oscillation_reset_dist: 0.05
  
  # 前瞻距离
  forward_point_distance: 0.325
  
  # 停止时间
  stop_time_buffer: 0.2
  
  # 其他
  holonomic_robot: false  # 差速驱动机器人
  meter_scoring: true
